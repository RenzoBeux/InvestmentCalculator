<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>Planificador FIRE · Calculá tu independencia financiera</title>
    <meta
      name="description"
      content="Calculá cuánto necesitás para vivir de tus inversiones: tu número de retiro, en cuántos años llegás y si tu cartera aguanta. Multi-moneda y con supuestos editables."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f6f2e9" />
    <link rel="canonical" href="https://fire.renzobeux.dev/" />

    <!-- Open Graph: previsualización al compartir el enlace (Reddit, WhatsApp, etc.). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Planificador FIRE" />
    <meta
      property="og:title"
      content="Planificador FIRE · Calculá tu independencia financiera"
    />
    <meta
      property="og:description"
      content="Calculá cuánto necesitás para vivir de tus inversiones: tu número de retiro, en cuántos años llegás y si tu cartera aguanta. Todo en valores de hoy."
    />
    <meta property="og:url" content="https://fire.renzobeux.dev/" />
    <meta property="og:image" content="https://fire.renzobeux.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Planificador FIRE — calculá cuánto necesitás para vivir de tus inversiones"
    />
    <meta property="og:locale" content="es_UY" />

    <!-- Twitter / X. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Planificador FIRE · Calculá tu independencia financiera"
    />
    <meta
      name="twitter:description"
      content="Tu número de retiro, en cuántos años llegás y si tu cartera aguanta. Todo en valores de hoy."
    />
    <meta name="twitter:image" content="https://fire.renzobeux.dev/og-image.png" />
    <!-- Aplica el tema elegido antes del primer pintado para evitar el parpadeo. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("fire.theme");
          var choice = raw ? JSON.parse(raw) : "system";
          var dark =
            choice === "dark" ||
            (choice === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#15130e" : "#f6f2e9");
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
